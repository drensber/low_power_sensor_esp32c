# --- LPS Transport Selection ---
CONFIG_LPS_TRANSPORT_THREAD_MQTTSN=y

# --- OpenThread Node Role ---
CONFIG_OPENTHREAD_MTD=y
CONFIG_OPENTHREAD_MTD_SED=y

# Disable OpenThread's automatic CPU light-sleep injection
CONFIG_PM=n

# --- Gateway Address ---
# The IPv6 address of your MQTT-SN gateway (e.g., the Raspberry Pi)
CONFIG_LPS_MQTT_BROKER_ADDR="fd11:22::1"
CONFIG_LPS_MQTT_BROKER_PORT=1884

# --- OpenThread Network Credentials ---
CONFIG_OPENTHREAD_NETWORK_NAME="YourNetwork"
CONFIG_OPENTHREAD_NETWORKKEY="YourHexKey"
CONFIG_OPENTHREAD_PANID=4660
CONFIG_OPENTHREAD_XPANID="YourExtPanId"
CONFIG_OPENTHREAD_CHANNEL=15

# --- OpenThread Network Storage (NVS) ---
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_NVS=y
CONFIG_SETTINGS=y
CONFIG_SETTINGS_NVS=y

# Map the missing Secure Storage functions to the Settings backend
CONFIG_SECURE_STORAGE_ITS_STORE_IMPLEMENTATION_SETTINGS=y




# --- Kernel Forensics ---
#CONFIG_ASSERT=y
#CONFIG_HWINFO=y
#CONFIG_EXTRA_EXCEPTION_INFO=y
#CONFIG_THREAD_NAME=y

# --- Stack Protection ---
#CONFIG_HW_STACK_PROTECTION=y
#CONFIG_TEST_EXTRA_STACK_SIZE=2048
#CONFIG_ISR_STACK_SIZE=4096

# --- Interrupt Debugging ---
#CONFIG_DEBUG=y
#CONFIG_LOG_DEFAULT_LEVEL=4

# Force -O0 (Zero Optimization) to slow down instruction execution
#CONFIG_NO_OPTIMIZATIONS=y