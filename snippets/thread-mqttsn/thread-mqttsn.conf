#CONFIG_THREAD_NAME=y

# --- Stack Protection ---
#CONFIG_HW_STACK_PROTECTION=y
#CONFIG_TEST_EXTRA_STACK_SIZE=2048
#CONFIG_ISR_STACK_SIZE=4096

# --- Interrupt Debugging ---
#CONFIG_DEBUG=y
