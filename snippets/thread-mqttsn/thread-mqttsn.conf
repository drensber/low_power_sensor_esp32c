# --- LPS Transport Selection ---
CONFIG_LPS_TRANSPORT_THREAD_MQTTSN=y

# --- OpenThread Node Role ---
CONFIG_OPENTHREAD_MTD=y
CONFIG_OPENTHREAD_MTD_SED=y
CONFIG_OPENTHREAD_POLL_PERIOD=1200000
CONFIG_OPENTHREAD_MANUAL_START=n
CONFIG_OPENTHREAD_JOINER=y
CONFIG_OPENTHREAD_DEFAULT_TX_POWER=8

# Disable OpenThread's automatic CPU light-sleep injection
CONFIG_PM=n

# --- Gateway Address ---
# The IPv6 address of your MQTT-SN gateway (e.g., the Raspberry Pi)
CONFIG_LPS_MQTT_BROKER_ADDR="ffaa:aaff:abcd:ef01:23ab:cdef:1111:3333"
CONFIG_LPS_MQTT_BROKER_PORT=1884

# --- OpenThread Network Credentials ---
CONFIG_OPENTHREAD_NETWORK_NAME="OpenThread-abc0"
CONFIG_OPENTHREAD_NETWORKKEY="01:23:45:67:89:ab:cd:ef:00:11:22:aa:bb:cc:dd:ee"
CONFIG_OPENTHREAD_PANID=12345
CONFIG_OPENTHREAD_XPANID="a0:b1:c2:d3:e4:f5:a1:b2"
CONFIG_OPENTHREAD_CHANNEL=22

# --- OpenThread Network Storage (NVS) ---
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_NVS=y
CONFIG_SETTINGS=y
CONFIG_SETTINGS_NVS=y

# Map the missing Secure Storage functions to the Settings backend
CONFIG_SECURE_STORAGE_ITS_STORE_IMPLEMENTATION_SETTINGS=y

CONFIG_NET_RX_STACK_SIZE=4096
CONFIG_NET_TX_STACK_SIZE=4096

# --- Network Resource Pools ---
# Default is usually 6. Expand to 10 to cover OpenThread + App Sockets
#CONFIG_NET_MAX_CONTEXTS=10
#CONFIG_ZVFS_OPEN_MAX=24

# The number of UDP/TCP port bindings (This clears the -12 error)
#CONFIG_NET_MAX_CONN=10

# A healthy heap for the underlying socket VFS allocations
#CONFIG_HEAP_MEM_POOL_SIZE=8192

# Bump the raw packet buffers just to ensure OpenThread doesn't starve the UDP stack
#CONFIG_NET_PKT_RX_COUNT=14
#CONFIG_NET_PKT_TX_COUNT=14
#CONFIG_NET_BUF_RX_COUNT=30
#CONFIG_NET_BUF_TX_COUNT=30

#CONFIG_NET_MAX_CONTEXTS=16
#CONFIG_NET_MAX_CONN=16

# --- OpenThread Address Arrays ---
# Thread claims ~7 multicast slots instantly. Expand this so MQTT-SN can
# join the interface.
CONFIG_NET_IF_MCAST_IPV6_ADDR_COUNT=14

# Give OpenThread breathing room for its multiple RLOC, Link-Local, and
# Mesh-Local unicast addresses
CONFIG_NET_IF_UNICAST_IPV6_ADDR_COUNT=10


# debug for mqttsn

#CONFIG_NET_LOG=y
#CONFIG_NET_CORE_LOG_LEVEL_DBG=y

# --- Socket & Context Allocation Tracing ---
#CONFIG_NET_SOCKETS_LOG_LEVEL_DBG=y
#CONFIG_NET_CONTEXT_LOG_LEVEL_DBG=y
#CONFIG_NET_CONN_LOG_LEVEL_DBG=y

